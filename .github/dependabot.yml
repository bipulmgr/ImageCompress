version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - dotnet
    commit-message:
      prefix: "chore(deps)"
    groups:
      microsoft-packages:
        patterns:
          - "Microsoft.*"
        update-types:
          - minor
          - patch
      imagemagick:
        patterns:
          - "Magick.NET*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
